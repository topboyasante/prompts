openapi: 3.0.3
info:
  title: Prompts.dev API
  version: 1.0.0
  description: Registry and distribution API for prompt packages.
servers:
  - url: http://localhost:8080/v1
tags:
  - name: Auth
  - name: Prompts
  - name: Versions
paths:
  /auth/{provider}/login:
    get:
      tags: [Auth]
      summary: Start OAuth login flow
      parameters:
        - $ref: '#/components/parameters/Provider'
        - in: query
          name: state
          schema:
            type: string
          required: false
          description: Optional state value. If omitted, API generates one.
        - in: query
          name: cli
          schema:
            type: boolean
          required: false
          description: If true, callback redirects for CLI flow.
      responses:
        '302':
          description: Redirect to OAuth provider authorization URL.
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/{provider}/callback:
    get:
      tags: [Auth]
      summary: Complete OAuth flow and issue JWT
      parameters:
        - $ref: '#/components/parameters/Provider'
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
        - in: query
          name: cli
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: JWT token issued for web flow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '302':
          description: Redirect with token for CLI flow.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /prompts:
    get:
      tags: [Prompts]
      summary: Search prompts
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchPromptsResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Prompts]
      summary: Create a prompt
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePromptRequest'
      responses:
        '201':
          description: Prompt created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prompt'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /prompts/{owner}/{name}:
    get:
      tags: [Prompts]
      summary: Get prompt by owner and name
      parameters:
        - $ref: '#/components/parameters/Owner'
        - $ref: '#/components/parameters/PromptName'
      responses:
        '200':
          description: Prompt details
          content:
            application/json:
              schema:
                type: object
                required: [prompt]
                properties:
                  prompt:
                    $ref: '#/components/schemas/Prompt'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /prompts/{id}/versions:
    post:
      tags: [Versions]
      summary: Upload a prompt version tarball
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PromptID'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [version, tarball]
              properties:
                version:
                  type: string
                  description: Semver string like 1.0.0
                tarball:
                  type: string
                  format: binary
      responses:
        '201':
          description: Version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptVersion'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalError'

  /prompts/{owner}/{name}/versions:
    get:
      tags: [Versions]
      summary: List prompt versions
      parameters:
        - $ref: '#/components/parameters/Owner'
        - $ref: '#/components/parameters/PromptName'
      responses:
        '200':
          description: Versions list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PromptVersion'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /prompts/{owner}/{name}/versions/{version}/download:
    get:
      tags: [Versions]
      summary: Redirect to prompt tarball download URL
      parameters:
        - $ref: '#/components/parameters/Owner'
        - $ref: '#/components/parameters/PromptName'
        - $ref: '#/components/parameters/Version'
      responses:
        '302':
          description: Redirect to presigned URL.
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Provider:
      in: path
      name: provider
      required: true
      schema:
        type: string
        enum: [github, google]
    Owner:
      in: path
      name: owner
      required: true
      schema:
        type: string
    PromptName:
      in: path
      name: name
      required: true
      schema:
        type: string
    PromptID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    Version:
      in: path
      name: version
      required: true
      schema:
        type: string

  responses:
    ValidationError:
      description: Validation failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Authentication or authorization failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Conflict with existing resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    AuthTokenResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string

    CreatePromptRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Must match ^[a-z0-9-]+$
        description:
          type: string
        tags:
          type: array
          items:
            type: string

    Prompt:
      type: object
      required: [id, name, owner_id, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        owner_id:
          type: string
          format: uuid
        owner_username:
          type: string
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    PromptVersion:
      type: object
      required: [id, prompt_id, version, tarball_url, created_at]
      properties:
        id:
          type: string
          format: uuid
        prompt_id:
          type: string
          format: uuid
        version:
          type: string
        tarball_url:
          type: string
        created_at:
          type: string
          format: date-time

    SearchPromptsResponse:
      type: object
      required: [items, query, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Prompt'
        query:
          type: string
        limit:
          type: integer
        offset:
          type: integer

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'

    ErrorDetail:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
          example: VALIDATION_FAILED
        message:
          type: string
        request_id:
          type: string
        details:
          type: object
          additionalProperties:
            type: string
